<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Planillas</title>

    <!-- Tailwind CSS (Diseño) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide Icons (Iconos) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Chart.js (Gráficos) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* Estilos personalizados para scrollbars y transiciones */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .fade-in {
            animation: fadeIn 0.2s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Truncamiento para la tabla */
        .truncate-text {
            display: -webkit-box;
            line-clamp: 2;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>

<body class="bg-slate-50 font-sans text-slate-800 p-4 md:p-8 min-h-screen">

    <!-- CABECERA -->
    <header
        class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
        <div>
            <h1 class="text-3xl font-bold text-slate-900 tracking-tight flex items-center gap-3">
                <i data-lucide="activity" class="text-teal-500 w-8 h-8"></i>
                Dashboard de Planillas
            </h1>
            <p class="text-slate-500 mt-1">Gestión y seguimiento de montos y acciones</p>
        </div>

        <div class="mt-4 md:mt-0 flex items-center gap-4">
            <div class="flex items-center gap-2 text-sm" id="syncStatusContainer">
                <i data-lucide="check-circle-2" class="w-5 h-5 text-emerald-500" id="syncIcon"></i>
                <span class="text-slate-600 font-medium" id="syncText">Sincronizado</span>
            </div>
            <button onclick="handleRefresh()"
                class="flex items-center gap-2 bg-slate-900 hover:bg-slate-800 text-white px-4 py-2 rounded-lg transition-colors shadow-sm">
                <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                Actualizar Datos
            </button>
        </div>
    </header>

    <!-- KPIs -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8" id="kpiContainer">
        <!-- Generado dinámicamente -->
    </div>

    <!-- GRÁFICOS -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
        <div class="lg:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
            <h3 class="text-lg font-semibold text-slate-800 mb-6">Resumen de Montos por Planilla</h3>
            <div class="h-72 w-full relative">
                <canvas id="barChart"></canvas>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
            <h3 class="text-lg font-semibold text-slate-800 mb-6">Proporción por Planilla</h3>
            <div class="h-72 w-full relative">
                <canvas id="pieChart"></canvas>
            </div>
        </div>
    </div>

    <!-- SECCIÓN DE TABLA DE DATOS -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">

        <!-- Controles y Filtros -->
        <div
            class="p-6 border-b border-slate-100 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-slate-50/50">
            <div class="flex flex-col md:flex-row gap-4 items-center w-full md:w-auto">
                <div class="flex items-center gap-2 w-full md:w-auto">
                    <i data-lucide="filter" class="w-5 h-5 text-slate-400"></i>
                    <select id="filterPlanilla" onchange="applyFilters()"
                        class="w-full md:w-auto bg-white border border-slate-200 text-slate-700 rounded-lg px-4 py-2 outline-none focus:border-teal-500 focus:ring-2 focus:ring-teal-200 transition-all">
                        <option value="Todas">Todas las planillas</option>
                    </select>
                </div>
            </div>

            <button onclick="openFormModal()"
                class="flex items-center justify-center gap-2 bg-teal-500 hover:bg-teal-600 text-white px-5 py-2.5 rounded-lg transition-colors font-medium shadow-sm w-full md:w-auto">
                <i data-lucide="plus" class="w-5 h-5"></i>
                Nuevo Registro
            </button>
        </div>

        <!-- Tabla -->
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-100 text-slate-600 text-sm uppercase tracking-wider">
                        <th class="p-4 font-semibold">N° Planilla</th>
                        <th class="p-4 font-semibold">Tipo / Acción</th>
                        <th class="p-4 font-semibold">Fecha</th>
                        <th class="p-4 font-semibold w-1/3">Observaciones / Aclaraciones</th>
                        <th class="p-4 font-semibold text-right">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-slate-100">
                    <!-- Generado dinámicamente -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- MODAL: VER OBSERVACIÓN COMPLETA -->
    <div id="obsModal"
        class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm fade-in">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-2xl overflow-hidden">
            <div class="flex justify-between items-center p-6 border-b border-slate-100 bg-slate-50">
                <h3 class="text-xl font-bold text-slate-900">Detalle de Observación</h3>
                <button onclick="closeObsModal()"
                    class="text-slate-400 hover:text-slate-700 bg-slate-200/50 hover:bg-slate-200 p-2 rounded-full transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="p-6">
                <p id="obsModalTitle" class="text-sm font-semibold text-teal-600 mb-4 uppercase tracking-wider"></p>
                <div id="obsModalContent"
                    class="bg-slate-50 p-5 rounded-xl border border-slate-100 text-slate-700 leading-relaxed whitespace-pre-wrap">
                </div>
            </div>
            <div class="p-4 border-t border-slate-100 flex justify-end bg-slate-50">
                <button onclick="closeObsModal()"
                    class="bg-slate-900 hover:bg-slate-800 text-white px-6 py-2 rounded-lg transition-colors">
                    Cerrar
                </button>
            </div>
        </div>
    </div>

    <!-- MODAL: FORMULARIO AGREGAR/EDITAR -->
    <div id="formModal"
        class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm fade-in">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden">
            <div class="flex justify-between items-center p-6 border-b border-slate-100">
                <h3 id="formModalTitle" class="text-xl font-bold text-slate-900">Nuevo Registro</h3>
                <button onclick="closeFormModal()"
                    class="text-slate-400 hover:text-slate-700 p-2 rounded-full transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>

            <form id="dataForm" onsubmit="handleSaveForm(event)">
                <input type="hidden" id="formId">
                <div class="p-6 space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">N° Planilla</label>
                        <input type="text" id="formPlanilla" required
                            class="w-full border border-slate-300 rounded-lg px-4 py-2.5 focus:border-teal-500 focus:ring-2 focus:ring-teal-200 outline-none transition-all"
                            placeholder="Ej. 32">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Tipo / Acción</label>
                        <input type="text" id="formTipo" required
                            class="w-full border border-slate-300 rounded-lg px-4 py-2.5 focus:border-teal-500 focus:ring-2 focus:ring-teal-200 outline-none transition-all"
                            placeholder="Ej. 1° PRESENTACION">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Fecha</label>
                        <input type="text" id="formFecha" required
                            class="w-full border border-slate-300 rounded-lg px-4 py-2.5 focus:border-teal-500 focus:ring-2 focus:ring-teal-200 outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Observaciones /
                            Aclaraciones</label>
                        <textarea id="formObservacion" required rows="4"
                            class="w-full border border-slate-300 rounded-lg px-4 py-2.5 focus:border-teal-500 focus:ring-2 focus:ring-teal-200 outline-none transition-all resize-none"
                            placeholder="Detalle de las observaciones..."></textarea>
                    </div>
                </div>
                <div class="p-6 border-t border-slate-100 flex justify-end gap-3 bg-slate-50">
                    <button type="button" onclick="closeFormModal()"
                        class="px-5 py-2.5 text-slate-600 hover:bg-slate-200 rounded-lg transition-colors font-medium">
                        Cancelar
                    </button>
                    <button type="submit" id="formSubmitBtn"
                        class="bg-teal-500 hover:bg-teal-600 text-white px-5 py-2.5 rounded-lg transition-colors font-medium shadow-sm">
                        Guardar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- JAVASCRIPT LOGIC -->

            { id: "22", planilla: "30", tipo: "INSTRUCTIVO PARA PRESENTACION DE PLANILLAS", fecha: "31/03/2026", observacion: "Habiendo transcurrido diez dias habiles (10) días hábiles sin que se hubiera efectuado la presentación de las Planillas de Avance N.° 29 y N.° 30, despues de la ultima devolucion y ante la ausencia de información respecto a su estado de revisión y subsanación, se le instruyó proceder con la remisión de las referidas planillas según nota SEDEM/GG/IBAE N°0406/2026, con todas las observaciones formuladas en revisiones anteriores hayan sido debidamente subsanadas, a efectos de continuar con el proceso de pago." },

        let barChartInstance = null;
        let pieChartInstance = null;

        // ==========================================
        // UTILIDADES
        // ==========================================
        const formatCurrency = (value) => {
            return new Intl.NumberFormat('es-BO', { style: 'currency', currency: 'BOB' }).format(value);
        };

        const getStatusBadgeHtml = (tipo) => {
            const upperTipo = tipo.toUpperCase();
            let bg = "bg-slate-100", text = "text-slate-700", border = "border-slate-200";

            if (upperTipo.includes('DEVOLUCION')) { bg = "bg-rose-50"; text = "text-rose-700"; border = "border-rose-200"; }
            else if (upperTipo.includes('PRESENTACION')) { bg = "bg-blue-50"; text = "text-blue-700"; border = "border-blue-200"; }
            else if (upperTipo.includes('PAGO')) { bg = "bg-emerald-50"; text = "text-emerald-700"; border = "border-emerald-200"; }
            else if (upperTipo.includes('NOTIFICACION') || upperTipo.includes('INSTRUCTIVO')) { bg = "bg-amber-50"; text = "text-amber-700"; border = "border-amber-200"; }

            return `<span class="px-3 py-1 rounded-md text-xs font-semibold border ${bg} ${text} ${border}">${tipo}</span>`;
        };

        // ==========================================
        // RENDERIZADOS PRINCIPALES
        // ==========================================

        function renderKPIs() {
            const totalMonto = montos.reduce((acc, curr) => acc + curr.montoTotal, 0);
            const totalLiquido = montos.reduce((acc, curr) => acc + curr.liquidoPagable, 0);
            const totalDescuento = montos.reduce((acc, curr) => acc + curr.descuento, 0);

            const container = document.getElementById('kpiContainer');
            container.innerHTML = `
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-5 transition-transform hover:-translate-y-1 duration-300">
                    <div class="p-4 rounded-xl bg-teal-50"><i data-lucide="dollar-sign" class="w-6 h-6 text-teal-600"></i></div>
                    <div><p class="text-sm font-medium text-slate-500 mb-1">Monto Total General</p><p class="text-2xl font-bold text-slate-900">${formatCurrency(totalMonto)}</p></div>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-5 transition-transform hover:-translate-y-1 duration-300">
                    <div class="p-4 rounded-xl bg-blue-50"><i data-lucide="file-text" class="w-6 h-6 text-blue-600"></i></div>
                    <div><p class="text-sm font-medium text-slate-500 mb-1">Líquido Pagable Total</p><p class="text-2xl font-bold text-slate-900">${formatCurrency(totalLiquido)}</p></div>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-5 transition-transform hover:-translate-y-1 duration-300">
                    <div class="p-4 rounded-xl bg-rose-50"><i data-lucide="alert-circle" class="w-6 h-6 text-rose-600"></i></div>
                    <div><p class="text-sm font-medium text-slate-500 mb-1">Descuento por Anticipo</p><p class="text-2xl font-bold text-slate-900">${formatCurrency(totalDescuento)}</p></div>
                </div>
            `;
            lucide.createIcons();
        }

        function populateFilterOptions() {
            const planillas = [...new Set(acciones.map(a => a.planilla))].sort();

            const selectPlanilla = document.getElementById('filterPlanilla');
            selectPlanilla.innerHTML = '<option value="Todas">Todas las planillas</option>';
            planillas.forEach(p => selectPlanilla.innerHTML += `<option value="${p}">Planilla ${p}</option>`);
        }

        function applyFilters() {
            const fPlanilla = document.getElementById('filterPlanilla').value;

            const filtered = acciones.filter(item => {
                return fPlanilla === 'Todas' || item.planilla === fPlanilla;
            });

            renderTable(filtered);
        }

        function renderTable(dataToRender) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            if (dataToRender.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-slate-500">No se encontraron registros para los filtros seleccionados.</td></tr>`;
                return;
            }

            dataToRender.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition-colors group";

                let obsHtml = '';
                if (row.observacion === 'Sin observacion') {
                    obsHtml = `<span class="text-slate-400 italic">Sin observación</span>`;
                } else {
                    obsHtml = `
                        <div class="flex items-center gap-2">
                            <p class="truncate-text max-w-[200px] lg:max-w-xs text-slate-700" title="${row.observacion.replace(/"/g, '&quot;')}">${row.observacion}</p>
                            <button onclick="openObsModal('${row.id}')" class="text-teal-600 hover:text-teal-800 hover:bg-teal-50 p-1.5 rounded-md transition-colors flex-shrink-0 flex items-center gap-1 text-xs font-medium">
                                <i data-lucide="eye" class="w-4 h-4"></i> Ver
                            </button>
                        </div>
                    `;
                }

                tr.innerHTML = `
                    <td class="p-4 font-medium text-slate-900" title="Planilla N° ${row.planilla}">
                        <span class="bg-slate-200 text-slate-800 px-3 py-1 rounded-full text-xs font-bold">${row.planilla}</span>
                    </td>
                    <td class="p-4 text-slate-700" title="${row.tipo}">${getStatusBadgeHtml(row.tipo)}</td>
                    <td class="p-4 text-slate-600 whitespace-nowrap" title="Fecha: ${row.fecha}">${row.fecha}</td>
                    <td class="p-4">${obsHtml}</td>
                    <td class="p-4 flex justify-end gap-2 opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="openFormModal('${row.id}')" class="p-2 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-colors" title="Editar registro">
                            <i data-lucide="edit-2" class="w-5 h-5"></i>
                        </button>
                        <button onclick="handleDelete('${row.id}')" class="p-2 text-slate-400 hover:text-rose-600 hover:bg-rose-50 rounded-lg transition-colors" title="Eliminar registro">
                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            lucide.createIcons();
        }

        function renderCharts() {
            // Preparar datos
            const labels = montos.map(m => `Planilla ${m.planilla}`);
            const dataLiquido = montos.map(m => m.liquidoPagable);
            const dataDescuento = montos.map(m => m.descuento);
            const dataMontoTotal = montos.map(m => m.montoTotal);

            // 1. Gráfico de Barras
            const ctxBar = document.getElementById('barChart').getContext('2d');
            if (barChartInstance) barChartInstance.destroy();

            barChartInstance = new Chart(ctxBar, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Líquido Pagable', data: dataLiquido, backgroundColor: '#14b8a6', borderRadius: 4 },
                        { label: 'Descuento', data: dataDescuento, backgroundColor: '#f43f5e', borderRadius: 4 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        tooltip: { callbacks: { label: (ctx) => `${ctx.dataset.label}: ${formatCurrency(ctx.raw)}` } },
                        legend: { position: 'bottom' }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { borderDash: [3, 3] },
                            ticks: { callback: (value) => `${value / 1000000}M` }
                        },
                        x: { grid: { display: false } }
                    }
                }
            });

            // 2. Gráfico de Pastel
            const ctxPie = document.getElementById('pieChart').getContext('2d');
            if (pieChartInstance) pieChartInstance.destroy();

            pieChartInstance = new Chart(ctxPie, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: dataMontoTotal,
                        backgroundColor: ['#0f172a', '#14b8a6', '#f43f5e', '#3b82f6'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '65%',
                    plugins: {
                        tooltip: { callbacks: { label: (ctx) => formatCurrency(ctx.raw) } },
                        legend: { position: 'bottom' }
                    }
                }
            });
        }

        // ==========================================
        // MANEJO DE EVENTOS (CRUD Y MODALES)
        // ==========================================

        async function syncWithGoogleSheets(action, data = null) {
            const icon = document.getElementById('syncIcon');
            const text = document.getElementById('syncText');

            icon.setAttribute('data-lucide', 'refresh-cw');
            icon.classList.add('animate-spin', 'text-teal-500');
            icon.classList.remove('text-emerald-500', 'text-rose-500');
            text.innerText = 'Sincronizando...';
            lucide.createIcons();

            try {
                // Simulación de conexión (Aquí iria el fetch() a Apps Script)
                await new Promise(r => setTimeout(r, 800));

                icon.setAttribute('data-lucide', 'check-circle-2');
                icon.classList.remove('animate-spin', 'text-teal-500', 'text-rose-500');
                icon.classList.add('text-emerald-500');
                text.innerText = 'Sincronizado';
            } catch (error) {
                icon.setAttribute('data-lucide', 'alert-circle');
                icon.classList.remove('animate-spin', 'text-teal-500', 'text-emerald-500');
                icon.classList.add('text-rose-500');
                text.innerText = 'Error';
            }
            lucide.createIcons();
        }

        function handleRefresh() {
            syncWithGoogleSheets('GET');
        }

        function handleDelete(id) {
            if (confirm('¿Estás seguro de que deseas eliminar este registro?')) {
                acciones = acciones.filter(a => a.id !== id);
                applyFilters();
                populateFilterOptions();
                syncWithGoogleSheets('DELETE', { id });
            }
        }

        // Modal: Observación Completa
        function openObsModal(id) {
            const item = acciones.find(a => a.id === id);
            if (!item) return;
            document.getElementById('obsModalTitle').innerText = `${item.tipo} - Planilla ${item.planilla}`;
            document.getElementById('obsModalContent').innerText = item.observacion;
            document.getElementById('obsModal').classList.remove('hidden');
        }
        function closeObsModal() { document.getElementById('obsModal').classList.add('hidden'); }

        // Modal: Formulario Add/Edit
        function openFormModal(id = null) {
            const form = document.getElementById('dataForm');
            const title = document.getElementById('formModalTitle');
            const btn = document.getElementById('formSubmitBtn');

            if (id) {
                const item = acciones.find(a => a.id === id);
                document.getElementById('formId').value = item.id;
                document.getElementById('formPlanilla').value = item.planilla;
                document.getElementById('formTipo').value = item.tipo;
                document.getElementById('formFecha').value = item.fecha;
                document.getElementById('formObservacion').value = item.observacion;
                title.innerText = 'Editar Registro';
                btn.innerText = 'Guardar Cambios';
            } else {
                form.reset();
                document.getElementById('formId').value = '';
                document.getElementById('formFecha').value = new Date().toLocaleDateString('es-BO');
                title.innerText = 'Nuevo Registro';
                btn.innerText = 'Crear Registro';
            }
            document.getElementById('formModal').classList.remove('hidden');
        }
        function closeFormModal() { document.getElementById('formModal').classList.add('hidden'); }

        function handleSaveForm(e) {
            e.preventDefault();
            const id = document.getElementById('formId').value;
            const newData = {
                id: id || Date.now().toString(),
                planilla: document.getElementById('formPlanilla').value,
                tipo: document.getElementById('formTipo').value,
                fecha: document.getElementById('formFecha').value,
                observacion: document.getElementById('formObservacion').value
            };

            if (id) {
                acciones = acciones.map(a => a.id === id ? newData : a);
                syncWithGoogleSheets('UPDATE', newData);
            } else {
                acciones.push(newData);
                syncWithGoogleSheets('CREATE', newData);
            }

            closeFormModal();
            applyFilters();
            populateFilterOptions();
        }

        // ==========================================
        // INICIALIZACIÓN
        // ==========================================
        window.onload = () => {
            renderKPIs();
            renderCharts();
            populateFilterOptions();
            applyFilters(); // Renderiza la tabla por primera vez
        };
    </script>
</body>

</html>
